# ─────────────────────────────────────────────────────────────────────────────
# DevTrace Logstash Pipeline
# Flow: Filebeat → Logstash (parse/enrich/classify) → Elasticsearch
# ─────────────────────────────────────────────────────────────────────────────

input {
  # Receive from Filebeat
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  # Accept raw TCP logs (for direct application logging)
  tcp {
    port => 5000
    codec => json_lines
  }

  # HTTP input for REST-based log ingestion
  http {
    port => 8081
    codec => json
  }
}

filter {
  # ── Parse timestamp ──────────────────────────────────────────────────────
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
    }
  }

  # ── Parse log level ──────────────────────────────────────────────────────
  if [message] {
    grok {
      match => {
        "message" => [
          "%{LOGLEVEL:level}%{SPACE}%{GREEDYDATA:log_message}",
          "\[%{LOGLEVEL:level}\]%{SPACE}%{GREEDYDATA:log_message}",
          "%{GREEDYDATA:log_message}"
        ]
      }
      overwrite => ["message"]
    }
    if [log_message] {
      mutate { rename => { "log_message" => "message" } }
    }
  }

  # ── Classify error type ───────────────────────────────────────────────────
  if [level] == "ERROR" or [level] == "WARN" {
    if [message] =~ /NullPointerException|NPE|null pointer/ {
      mutate { add_field => { "errorType" => "NullPointerException" } }
      mutate { add_field => { "rootCause" => "Uninitialized object reference. Check for null before accessing methods." } }
    } else if [message] =~ /DatabaseConnectionException|Connection refused|JDBC|SQL.*error|connection pool/ {
      mutate { add_field => { "errorType" => "DatabaseConnectionException" } }
      mutate { add_field => { "rootCause" => "Database unreachable or connection pool exhausted. Check DB host/port and pool settings." } }
    } else if [message] =~ /TimeoutException|Read timed out|SocketTimeout|deadline exceeded/ {
      mutate { add_field => { "errorType" => "TimeoutException" } }
      mutate { add_field => { "rootCause" => "External service or DB query exceeded timeout. Check network latency and optimize queries." } }
    } else if [message] =~ /OutOfMemoryError|heap space|GC overhead/ {
      mutate { add_field => { "errorType" => "OutOfMemoryError" } }
      mutate { add_field => { "rootCause" => "JVM heap exhausted. Increase -Xmx, profile for memory leaks." } }
    } else if [message] =~ /500|Internal Server Error|HTTP 500/ {
      mutate { add_field => { "errorType" => "HTTP500Error" } }
      mutate { add_field => { "rootCause" => "Unhandled server exception. Check application logs for root cause." } }
    } else if [message] =~ /AuthenticationException|Unauthorized|token expired|401|403/ {
      mutate { add_field => { "errorType" => "AuthenticationException" } }
      mutate { add_field => { "rootCause" => "Invalid credentials or expired token. Verify auth service health." } }
    } else if [message] =~ /StackOverflowError|stack overflow/ {
      mutate { add_field => { "errorType" => "StackOverflowError" } }
      mutate { add_field => { "rootCause" => "Infinite or deeply nested recursion. Check recursive method termination." } }
    } else {
      mutate { add_field => { "errorType" => "UnknownError" } }
      mutate { add_field => { "rootCause" => "Unknown error. Review stack trace and application logs." } }
    }
  }

  # ── Normalize level to uppercase ─────────────────────────────────────────
  if [level] {
    mutate { uppercase => ["level"] }
  } else {
    mutate { add_field => { "level" => "INFO" } }
  }

  # ── Set environment ──────────────────────────────────────────────────────
  if ![environment] {
    mutate { add_field => { "environment" => "production" } }
  }

  # ── Generate traceId if missing ──────────────────────────────────────────
  if ![traceId] {
    uuid { target => "traceId" }
  }

  # ── Remove internal Logstash/Filebeat fields ─────────────────────────────
  mutate {
    remove_field => ["@version", "agent", "ecs", "input", "log", "host.name"]
  }
}

output {
  # ── Write to Elasticsearch with daily rolling index ──────────────────────
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "devtrace-logs-%{+YYYY.MM.dd}"
    template_name => "devtrace-logs"
    template => "/usr/share/logstash/templates/devtrace-template.json"
    template_overwrite => false

    # Retry settings
    retry_on_conflict => 3
  }

  # ── Debug output (disable in production) ─────────────────────────────────
  if [level] == "ERROR" {
    stdout {
      codec => rubydebug {
        metadata => false
      }
    }
  }
}
